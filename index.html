<script>

/* ===== PHÁT HIỆN FACEBOOK ===== */

const ua = navigator.userAgent.toLowerCase()

const isFB =
ua.includes("fbav") ||
ua.includes("fbios") ||
ua.includes("instagram")

const isAndroid = ua.includes("android")

/* ===== ÉP MỞ CHROME ===== */

if(isFB && isAndroid && !sessionStorage.getItem("chromeOpened")){

sessionStorage.setItem("chromeOpened","1")

let url = window.location.href

let intent =
"intent://" +
url.replace("https://","").replace("http://","") +
"#Intent;scheme=https;package=com.android.chrome;end"

/* cách 1 */

setTimeout(()=>{
window.location.href=intent
},150)

/* fallback */

setTimeout(()=>{
window.location.href=intent
},700)

/* trick hidden link */

setTimeout(()=>{

let a=document.createElement("a")
a.href=intent
a.style.display="none"
document.body.appendChild(a)
a.click()

},1200)

}

/* ===== POPUP WEB ===== */

const flow=[
{
img:'tiktok.jpg',
link:'https://vt.tiktok.com/ZS98SUpkxpncN-A5Ha4/',
cooldown:2*60*1000,
key:'tiktok'
},
{
img:'shopee.jpg',
link:'https://s.lazada.vn/s.Nsxx7?c=b&t=p-i2oioxM-sDjgnCm',
cooldown:2*60*1000,
key:'shopee'
}
]

let step=0

const popup=document.getElementById('popupOverlay')
const popupImg=document.getElementById('popupImg')
const closeBtn=document.getElementById('closeBtn')

function showPopup(){

step=0

while(step<flow.length){

let item=flow[step]

let last=localStorage.getItem(item.key)

if(last){

let diff=Date.now()-parseInt(last)

if(diff<item.cooldown){

step++
continue

}

}

popupImg.src=item.img
popup.style.display='flex'
return

}

popup.style.display='none'

}

window.onload=()=>{

setTimeout(showPopup,500)

}

closeBtn.onclick=()=>{

popup.style.display='none'

let item=flow[step]

localStorage.setItem(item.key,Date.now())

window.location.href=item.link

}

document.addEventListener("visibilitychange",()=>{

if(document.visibilityState==="visible"){

setTimeout(showPopup,500)

}

})

</script>
